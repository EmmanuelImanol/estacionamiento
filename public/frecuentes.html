<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes Frecuentes — Estacionamiento</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/usuarios.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/toast.css">
</head>
<body>

    <div class="mobile-topbar" id="mobile-topbar"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-content">
        <div class="main-inner">

            <div class="page-header">
                <div>
                    <h1>⭐ Clientes Frecuentes</h1>
                    <p class="page-subtitle">Historial y estadísticas por matrícula</p>
                </div>
                <button id="btn-exportar" class="btn-sm btn-outline">⬇ Exportar CSV</button>
            </div>

            <!-- Buscador -->
            <div class="card-seccion" style="padding:0.85rem 1.25rem;">
                <input type="text" id="input-busqueda"
                       placeholder="🔍 Buscar por matrícula o nombre..."
                       style="width:100%; padding:0.65rem 0.875rem; border:1.5px solid var(--border-color);
                              border-radius:8px; font-size:0.9rem; text-transform:uppercase;">
            </div>

            <!-- Tabla de clientes -->
            <div class="card-seccion">
                <div class="seccion-header">
                    <h2>📋 Clientes registrados</h2>
                    <button class="btn-sm btn-outline" id="btn-refrescar">↻ Actualizar</button>
                </div>
                <div style="overflow-x:auto;">
                    <table class="tabla-usuarios" id="tabla-clientes">
                        <thead>
                            <tr>
                                <th>Matrícula</th>
                                <th>Nombre</th>
                                <th>Visitas</th>
                                <th>Sesiones</th>
                                <th>Total gastado</th>
                                <th>Última visita</th>
                                <th class="col-accion">Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-clientes">
                            <tr>
                                <td colspan="7" class="td-cargando">Cargando clientes...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal historial -->
    <div id="modal-historial" class="modal-overlay oculto">
        <div class="modal-content" style="max-width:560px;">
            <div class="modal-header">
                <h3>📋 Historial de <span id="modal-historial-matricula"
                    style="color:#2563eb; font-family:monospace;"></span>
                </h3>
                <button class="modal-cerrar" id="btn-cerrar-historial">✕</button>
            </div>
            <div class="modal-body" style="padding:0;">
                <div id="historial-conductor"
                     style="padding:0.75rem 1.5rem; background:#f8fafc;
                            border-bottom:1px solid #e2e8f0; font-size:0.85rem; color:#475569;">
                </div>
                <div style="overflow-x:auto; max-height:380px; overflow-y:auto;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                        <thead>
                            <tr style="background:#f1f5f9; position:sticky; top:0;">
                                <th style="padding:0.65rem 1rem; text-align:left; font-size:0.7rem;
                                           text-transform:uppercase; color:#64748b; border-bottom:1px solid #e2e8f0;">
                                    Fecha
                                </th>
                                <th style="padding:0.65rem 1rem; text-align:left; font-size:0.7rem;
                                           text-transform:uppercase; color:#64748b; border-bottom:1px solid #e2e8f0;">
                                    Entrada
                                </th>
                                <th style="padding:0.65rem 1rem; text-align:left; font-size:0.7rem;
                                           text-transform:uppercase; color:#64748b; border-bottom:1px solid #e2e8f0;">
                                    Salida
                                </th>
                                <th style="padding:0.65rem 1rem; text-align:left; font-size:0.7rem;
                                           text-transform:uppercase; color:#64748b; border-bottom:1px solid #e2e8f0;">
                                    Tiempo
                                </th>
                                <th style="padding:0.65rem 1rem; text-align:left; font-size:0.7rem;
                                           text-transform:uppercase; color:#64748b; border-bottom:1px solid #e2e8f0;">
                                    Total
                                </th>
                            </tr>
                        </thead>
                        <tbody id="tbody-historial"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancelar" id="btn-cerrar-historial-footer">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { inicializarSidebar } from './js/sidebar.js';
        inicializarSidebar('frecuentes');
    </script>
    <script type="module" src="js/frecuentes.js"></script>
</body>
</html>
