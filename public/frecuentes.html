<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <title>Frecuentes — Estacionamiento</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/usuarios.css">
    <link rel="stylesheet" href="css/toast.css">
</head>
<body>
    <div class="mobile-topbar" id="mobile-topbar"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-content">
        <div class="main-inner">

            <div class="page-header">
                <div>
                    <h1><i class="fa-solid fa-star"></i> Clientes Frecuentes</h1>
                    <p class="page-subtitle">Historial y estadísticas de clientes registrados</p>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center;">
                    <input type="text" id="input-busqueda"
                           placeholder="Buscar matrícula o nombre..."
                           style="width:220px; text-transform:none;">
                    <button class="btn btn-sm btn-outline" id="btn-exportar">
                        <i class="fa-solid fa-file-csv"></i> Exportar CSV
                    </button>
                </div>
            </div>

            <div class="card-seccion">
                <div class="seccion-header">
                    <h2><i class="fa-solid fa-list"></i> Clientes registrados</h2>
                    <button class="btn btn-sm btn-outline" id="btn-refrescar">
                        <i class="fa-solid fa-rotate"></i> Actualizar
                    </button>
                </div>
                <div style="overflow-x:auto;">
                    <table class="tabla-usuarios">
                        <thead>
                            <tr>
                                <th>Matrícula</th>
                                <th>Nombre</th>
                                <th style="text-align:center;">Visitas</th>
                                <th style="text-align:center;">Sesiones</th>
                                <th>Total gastado</th>
                                <th>Última visita</th>
                                <th class="col-accion">Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-clientes">
                            <tr><td colspan="7" class="td-cargando">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal historial -->
    <div id="modal-historial" class="modal-overlay oculto">
        <div class="modal-content" style="max-width:560px;">
            <div class="modal-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Historial del cliente</h3>
                <button class="modal-cerrar" id="btn-cerrar-historial">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-info" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;">
                    <span id="hist-matricula" style="font-size:1.2rem;font-weight:700;color:#1d4ed8;font-family:monospace;"></span>
                    <span id="hist-nombre" style="font-size:0.85rem;color:#64748b;"></span>
                </div>
                <div id="hist-tabla" style="overflow-x:auto;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-cancelar" id="btn-cerrar-historial-footer">
                    <i class="fa-solid fa-xmark"></i> Cerrar
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { inicializarSidebar } from './js/sidebar.js';
        inicializarSidebar('frecuentes');
    </script>
    <script type="module" src="js/frecuentes.js"></script>
</body>
</html>
