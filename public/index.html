<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamiento El Centro — Acceso</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-wrapper">
    <div class="negocio-header">
        <div class="negocio-logo">🅿</div>
        <div class="negocio-nombre">Estacionamiento El Centro</div>
        <div class="negocio-subtitulo">Sistema de Control de Acceso</div>
    </div>

    <div class="login-card">
        <h2>Iniciar sesión</h2>
        <p>Ingresa tus credenciales para acceder al sistema.</p>

        <div id="error-box" class="error-box"></div>

        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button id="btn-login" class="btn-login">Iniciar Sesión</button>
    </div>

    <div class="login-footer">
        Av. Reforma No. 123 · Ciudad de México · Tel: (55) 1234-5678
    </div>
</div>

<script type="module">
    import { ParkingAPI } from './api.js';

    const btnLogin  = document.getElementById('btn-login');
    const errorBox  = document.getElementById('error-box');
    const inputPass = document.getElementById('password');

    function mostrarError(msg) {
        errorBox.textContent    = msg;
        errorBox.style.display  = 'block';
    }

    async function intentarLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorBox.style.display = 'none';

        if (!email || !password) {
            mostrarError('Por favor ingresa tu correo y contraseña.');
            return;
        }

        btnLogin.disabled    = true;
        btnLogin.textContent = 'Verificando...';

        try {
            const res = await ParkingAPI.login(email, password);
            sessionStorage.setItem('usuario_nombre', res.data.nombre);
            sessionStorage.setItem('usuario_rol',    res.data.rol);
            window.location.href = 'home.html';
        } catch (err) {
            mostrarError(err.message || 'Credenciales incorrectas.');
            btnLogin.disabled    = false;
            btnLogin.textContent = 'Iniciar Sesión';
        }
    }

    btnLogin.addEventListener('click', intentarLogin);
    inputPass.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') intentarLogin();
    });
</script>
</body>
</html>
