<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Estacionamiento</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>

    <!-- Placeholders del sidebar -->
    <div class="mobile-topbar" id="mobile-topbar"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Contenido principal -->
    <div class="main-content">
        <div class="main-inner">

            <div class="page-header">
                <div>
                    <h1>👥 Gestión de Usuarios</h1>
                    <p class="page-subtitle">Crea y administra los accesos al sistema</p>
                </div>
            </div>

            <!-- Formulario nuevo usuario -->
            <div class="card-seccion">
                <div class="seccion-header">
                    <h2>➕ Nuevo Usuario</h2>
                </div>
                <div class="form-usuarios">
                    <div class="form-field">
                        <label for="u-nombre">Nombre completo</label>
                        <input type="text" id="u-nombre" placeholder="Ej. Juan Pérez">
                    </div>
                    <div class="form-field">
                        <label for="u-email">Correo electrónico</label>
                        <input type="email" id="u-email" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="form-field">
                        <label for="u-password">Contraseña</label>
                        <input type="password" id="u-password" placeholder="Mínimo 8 caracteres">
                    </div>
                    <div class="form-field">
                        <label for="u-rol">Rol</label>
                        <select id="u-rol">
                            <option value="cajero">Cajero</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
                <div id="usuario-msg" class="usuario-msg oculto"></div>
                <button id="btn-crear-usuario" class="btn btn-primary" style="width:100%;">
                    Crear Usuario
                </button>
            </div>

            <!-- Tabla de usuarios -->
            <div class="card-seccion">
                <div class="seccion-header">
                    <h2>📋 Usuarios Registrados</h2>
                    <button class="btn-sm btn-outline" id="btn-refrescar-usuarios">↻ Actualizar</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="tabla-usuarios">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Registrado</th>
                                <th>Estado</th>
                                <th class="col-accion">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-usuarios">
                            <tr>
                                <td colspan="6" class="td-cargando">Cargando usuarios...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal editar usuario -->
    <div class="modal-overlay oculto" id="modal-editar">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Editar Usuario</h3>
                <button class="modal-cerrar" id="btn-cerrar-modal">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-field" style="margin-bottom: 0.85rem;">
                    <label for="edit-nombre">Nombre completo</label>
                    <input type="text" id="edit-nombre" placeholder="Nombre completo">
                </div>
                <div class="form-field" style="margin-bottom: 0.85rem;">
                    <label for="edit-email">Correo electrónico</label>
                    <input type="email" id="edit-email" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-field" style="margin-bottom: 0.85rem;">
                    <label for="edit-rol">Rol</label>
                    <select id="edit-rol">
                        <option value="cajero">Cajero</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="form-field">
                    <label for="edit-password">
                        Nueva contraseña
                        <span style="color:#9ca3af; font-weight:400;">(dejar vacío para no cambiar)</span>
                    </label>
                    <input type="password" id="edit-password" placeholder="Mínimo 8 caracteres">
                </div>
            </div>
            <div id="edit-msg" class="usuario-msg oculto"></div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" id="btn-cancelar-edicion">Cancelar</button>
                <button class="btn btn-primary"        id="btn-guardar-edicion">Guardar cambios</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { inicializarSidebar } from './js/sidebar.js';
        inicializarSidebar('usuarios');
    </script>
    <script type="module" src="js/usuarios.js"></script>
</body>
</html>
