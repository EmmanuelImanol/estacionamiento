<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Estacionamiento</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/toast.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
    <div class="mobile-topbar" id="mobile-topbar"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-content">
        <div class="main-inner">

            <div class="page-header">
                <div>
                    <h1><i class="fa-solid fa-chart-line"></i> Dashboard</h1>
                    <p class="page-subtitle">Resumen de operaciones e ingresos</p>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center;">
                    <span id="nombre-usuario" style="font-size:0.85rem;color:#64748b;"></span>
                    <span id="badge-rol" class="badge-rol"></span>
                    <button class="btn btn-sm btn-outline" id="btn-logout">
                        <i class="fa-solid fa-power-off"></i> Cerrar sesión
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card" style="--stat-color:#2563eb;">
                    <div class="stat-icon"><i class="fa-solid fa-car"></i></div>
                    <div class="stat-valor skeleton">&nbsp;</div>
                    <div class="stat-label">Autos hoy</div>
                </div>
                <div class="stat-card" style="--stat-color:#22c55e;">
                    <div class="stat-icon"><i class="fa-solid fa-circle-dot"></i></div>
                    <div class="stat-valor skeleton">&nbsp;</div>
                    <div class="stat-label">Adentro ahora</div>
                </div>
                <div class="stat-card" style="--stat-color:#f59e0b;">
                    <div class="stat-icon"><i class="fa-solid fa-flag-checkered"></i></div>
                    <div class="stat-valor skeleton">&nbsp;</div>
                    <div class="stat-label">Salidas hoy</div>
                </div>
                <div class="stat-card" style="--stat-color:#059669;">
                    <div class="stat-icon"><i class="fa-solid fa-sack-dollar"></i></div>
                    <div class="stat-valor skeleton">&nbsp;</div>
                    <div class="stat-label">Ingresos hoy</div>
                </div>
                <div class="stat-card solo-admin" style="--stat-color:#8b5cf6;">
                    <div class="stat-icon"><i class="fa-solid fa-receipt"></i></div>
                    <div class="stat-valor skeleton">&nbsp;</div>
                    <div class="stat-label">Ticket promedio</div>
                </div>
            </div>

            <!-- Gráfica (solo admin) -->
            <div class="card-seccion solo-admin" id="seccion-grafica">
                <div class="seccion-header">
                    <h2><i class="fa-solid fa-chart-bar"></i> Ingresos</h2>
                    <div class="tabs">
                        <button class="tab activo" id="tab-horas">Por hora</button>
                        <button class="tab" id="tab-dias">Últimos 7 días</button>
                    </div>
                </div>
                <canvas id="grafica-ingresos" height="100"></canvas>
            </div>

            <!-- Sesiones con filtros -->
            <div class="card-seccion">
                <div class="seccion-header">
                    <h2><i class="fa-solid fa-clock-rotate-left"></i> Sesiones</h2>
                    <button class="btn btn-sm btn-outline" id="btn-refrescar">
                        <i class="fa-solid fa-rotate"></i> Actualizar
                    </button>
                </div>

                <div class="filtros-contenedor">
                    <div class="filtro-campo">
                        <label for="filtro-desde">Desde</label>
                        <input type="date" id="filtro-desde">
                    </div>
                    <div class="filtro-campo">
                        <label for="filtro-hasta">Hasta</label>
                        <input type="date" id="filtro-hasta">
                    </div>
                    <div class="filtro-campo">
                        <label for="filtro-estado">Estado</label>
                        <select id="filtro-estado">
                            <option value="">Todos</option>
                            <option value="ACTIVA">Activas</option>
                            <option value="FINALIZADA">Finalizadas</option>
                        </select>
                    </div>
                    <div class="filtro-botones">
                        <button id="btn-filtrar" class="btn btn-primary">
                            <i class="fa-solid fa-filter"></i> Filtrar
                        </button>
                        <button id="btn-limpiar-filtro" class="btn btn-sm btn-outline">
                            <i class="fa-solid fa-xmark"></i> Limpiar
                        </button>
                        <button id="btn-exportar-csv" class="btn btn-sm btn-outline">
                            <i class="fa-solid fa-file-csv"></i> CSV
                        </button>
                    </div>
                </div>

                <div id="resumen-filtro" style="display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;color:#64748b;margin-bottom:0.75rem;padding:0 0.25rem;"></div>

                <div style="overflow-x:auto;">
                    <table class="tabla-dashboard">
                        <thead>
                            <tr>
                                <th>Matrícula</th>
                                <th>Conductor</th>
                                <th>Entrada</th>
                                <th>Salida</th>
                                <th>Tiempo</th>
                                <th>Total</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-sesiones">
                            <tr><td colspan="7" class="td-cargando">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { inicializarSidebar } from './js/sidebar.js';
        inicializarSidebar('dashboard');
    </script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
